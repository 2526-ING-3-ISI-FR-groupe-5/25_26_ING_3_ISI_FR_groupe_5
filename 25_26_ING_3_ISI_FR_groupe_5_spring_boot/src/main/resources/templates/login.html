<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Connexion — CarnetRouge</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet"/>

    <!-- DaisyUI + Tailwind -->
    <link th:href="@{/css/output.css}" rel="stylesheet" type="text/css" />

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    colors: {
                        bgdeep: '#0a0b0f',
                        t: '#111318',
                        primary: {
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Dark mode init -->
    <script>
        (function() {
            const saved = localStorage.getItem('cr-theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (saved === 'dark' || (!saved && prefersDark)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>

    <style>
        body { font-family: 'Poppins', sans-serif; }

        .login-bg {
            background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 50%, #0a0b0f 100%);
        }

        .dark .login-bg {
            background: linear-gradient(135deg, #0a0b0f 0%, #111318 50%, #1e3a8a 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .dark .glass-card {
            background: rgba(17, 19, 24, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-up {
            animation: fadeInUp 0.4s ease forwards;
        }
    </style>
</head>

<body class="dark:bg-bgdeep min-h-screen">
<div class="login-bg min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md animate-fade-up">

        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16
                        bg-white/10 backdrop-blur-sm rounded-2xl mb-4 shadow-lg">
                <svg class="w-9 h-9 text-white" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-tight">CarnetRouge</h1>
            <p class="text-blue-200 text-sm mt-1">Système de gestion académique</p>
        </div>

        <!-- Card -->
        <div class="glass-card rounded-3xl shadow-2xl p-8">

            <h2 class="text-xl font-bold text-gray-900 dark:text-white mb-1">
                Connexion
            </h2>
            <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">
                Entrez vos identifiants pour accéder à votre espace
            </p>

            <!-- Flash messages -->
            <div th:if="${erreur != null}"
                 class="alert alert-error mb-4 rounded-xl text-sm py-2.5">
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span th:text="${erreur}"></span>
            </div>

            <div th:if="${message != null}"
                 class="alert alert-success mb-4 rounded-xl text-sm py-2.5">
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span th:text="${message}"></span>
            </div>

            <!-- Formulaire - action vers ton endpoint /login -->
            <form th:action="@{/login}" method="post" class="space-y-4">

                <!-- Email -->
                <div class="form-control">
                    <label class="label pb-1">
                        <span class="label-text text-sm font-medium
                                     text-gray-700 dark:text-gray-300">
                            Adresse email
                        </span>
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3
                                    flex items-center pointer-events-none">
                            <svg class="w-4 h-4 text-gray-400" fill="none"
                                 stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                      stroke-width="2"
                                      d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/>
                            </svg>
                        </div>
                        <input type="email"
                               name="email"
                               placeholder="votre@email.com"
                               required
                               autocomplete="email"
                               class="input input-bordered w-full pl-9 rounded-xl
                                      dark:bg-gray-800 dark:border-gray-700
                                      dark:text-white focus:border-primary-500"/>
                    </div>
                </div>

                <!-- Mot de passe -->
                <div class="form-control">
                    <label class="label pb-1">
                        <span class="label-text text-sm font-medium
                                     text-gray-700 dark:text-gray-300">
                            Mot de passe
                        </span>
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3
                                    flex items-center pointer-events-none">
                            <svg class="w-4 h-4 text-gray-400" fill="none"
                                 stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                      stroke-width="2"
                                      d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                            </svg>
                        </div>
                        <input type="password"
                               id="password"
                               name="password"
                               placeholder="••••••••"
                               required
                               autocomplete="current-password"
                               class="input input-bordered w-full pl-9 pr-10 rounded-xl
                                      dark:bg-gray-800 dark:border-gray-700
                                      dark:text-white focus:border-primary-500"/>
                        <button type="button"
                                onclick="togglePassword()"
                                class="absolute inset-y-0 right-0 pr-3
                                       flex items-center text-gray-400
                                       hover:text-gray-600 transition-colors">
                            <svg id="eye-icon" class="w-4 h-4" fill="none"
                                 stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                      stroke-width="2"
                                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round"
                                      stroke-width="2"
                                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit"
                        class="btn btn-primary w-full rounded-xl mt-2 gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor"
                         viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              stroke-width="2"
                              d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
                    </svg>
                    Se connecter
                </button>

            </form>

            <!-- Lien refresh token (caché, utilisé par JS si besoin) -->
            <div class="hidden" id="refresh-token-url" data-url="/refresh-token"></div>
        </div>

        <!-- Footer -->
        <p class="text-center text-blue-200/60 text-xs mt-6">
            © 2025 CarnetRouge — Tous droits réservés
        </p>

    </div>
</div>

<script>
    function togglePassword() {
        const input = document.getElementById('password');
        const icon  = document.getElementById('eye-icon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.innerHTML = `
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7
                         a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878
                         9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3
                         3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543
                         7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>`;
        } else {
            input.type = 'password';
            icon.innerHTML = `
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542
                         7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;
        }
    }

    // Dark mode
    document.addEventListener('DOMContentLoaded', () => {
        const saved = localStorage.getItem('cr-theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved === 'dark' || (!saved && prefersDark)) {
            document.documentElement.classList.add('dark');
        }
    });
</script>
</body>
</html>
