<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/app}">
<head>
    <title>Statistiques — CarnetRouge</title>
</head>
<body>

<div layout:fragment="content">
    <div class="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8 lg:py-10">

        <div class="mb-6">
            <a th:href="@{/admin/journal}" class="inline-flex items-center gap-2 text-gray-500 hover:text-primary transition-colors group">
                <svg class="w-4 h-4 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                Retour au journal
            </a>
        </div>

        <div class="mb-8">
            <h1 class="font-serif text-2xl md:text-3xl text-gray-900 dark:text-white mb-2">
                Statistiques <span class="text-primary italic">journal</span>
            </h1>
            <p class="text-sm text-gray-500 dark:text-gray-400">
                Analyse des actions enregistrées
            </p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Actions par type -->
            <div class="bg-white dark:bg-bgcard rounded-2xl border border-gray-200 dark:border-white/5 p-6">
                <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                    </svg>
                    Actions par type
                </h2>
                <div class="space-y-3 max-h-96 overflow-y-auto">
                    <div th:each="stat : ${statsByType}" class="flex items-center justify-between py-2 border-b border-gray-100 dark:border-white/5">
                        <span class="text-gray-600 dark:text-gray-400" th:text="${stat.typeActionLibelle}"></span>
                        <span class="badge badge-primary" th:text="${stat.nombre}"></span>
                    </div>
                    <div th:if="${statsByType.empty}" class="text-center text-gray-500 py-4">
                        Aucune statistique disponible
                    </div>
                </div>
            </div>

            <!-- Échecs par utilisateur -->
            <div class="bg-white dark:bg-bgcard rounded-2xl border border-gray-200 dark:border-white/5 p-6">
                <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    Échecs par utilisateur
                </h2>
                <div class="space-y-3 max-h-96 overflow-y-auto">
                    <div th:each="echec : ${statsByEchecs}" class="flex items-center justify-between py-2 border-b border-gray-100 dark:border-white/5">
                        <div>
                            <span class="font-medium text-gray-900 dark:text-white" th:text="${echec.utilisateurNom} + ' ' + ${echec.utilisateurPrenom}"></span>
                            <span class="text-xs text-gray-500 block" th:text="'ID: ' + ${echec.utilisateurId}"></span>
                        </div>
                        <span class="badge badge-error" th:text="${echec.nombreEchecs}"></span>
                    </div>
                    <div th:if="${statsByEchecs.empty}" class="text-center text-gray-500 py-4">
                        Aucun échec enregistré
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
