<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/app}">
<head>
    <title>Détail action — CarnetRouge</title>
</head>
<body>

<div layout:fragment="content">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8 lg:py-10">

        <div class="mb-6">
            <a th:href="@{/admin/journal}" class="inline-flex items-center gap-2 text-gray-500 hover:text-primary transition-colors group">
                <svg class="w-4 h-4 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                Retour au journal
            </a>
        </div>

        <div class="mb-8">
            <h1 class="font-serif text-2xl md:text-3xl text-gray-900 dark:text-white mb-2">
                Détail de <span class="text-primary italic">l'action</span>
            </h1>
            <p class="text-sm text-gray-500 dark:text-gray-400">
                Informations détaillées de l'action enregistrée
            </p>
        </div>

        <div class="bg-white dark:bg-bgcard rounded-2xl border border-gray-200 dark:border-white/5 overflow-hidden">
            <div class="divide-y divide-gray-100 dark:divide-white/5">
                <!-- Utilisateur -->
                <div class="flex items-center justify-between p-5">
                    <span class="text-gray-500 dark:text-gray-400 font-medium">Utilisateur</span>
                    <div class="text-right">
                        <span class="font-medium text-gray-900 dark:text-white" th:text="${journal.utilisateurNom} + ' ' + ${journal.utilisateurPrenom}"></span>
                        <span class="text-sm text-gray-500 block" th:text="${journal.utilisateurEmail}"></span>
                        <span class="text-xs text-gray-400" th:text="${journal.utilisateurType}"></span>
                    </div>
                </div>

                <!-- Type d'action -->
                <div class="flex items-center justify-between p-5">
                    <span class="text-gray-500 dark:text-gray-400 font-medium">Type d'action</span>
                    <span class="font-medium text-gray-900 dark:text-white" th:text="${journal.typeActionLibelle}"></span>
                </div>

                <!-- Entité concernée -->
                <div class="flex items-center justify-between p-5">
                    <span class="text-gray-500 dark:text-gray-400 font-medium">Entité concernée</span>
                    <span class="font-medium text-gray-900 dark:text-white" th:text="${journal.entiteConcernee}"></span>
                </div>

                <div th:if="${journal.entiteId}" class="flex items-center justify-between p-5">
                    <span class="text-gray-500 dark:text-gray-400 font-medium">ID de l'entité</span>
                    <span class="font-mono text-gray-900 dark:text-white" th:text="${journal.entiteId}"></span>
                </div>

                <!-- Description -->
                <div class="flex items-center justify-between p-5">
                    <span class="text-gray-500 dark:text-gray-400 font-medium">Description</span>
                    <span class="text-gray-900 dark:text-white text-right max-w-md" th:text="${journal.description}"></span>
                </div>

                <!-- Statut -->
                <div class="flex items-center justify-between p-5">
                    <span class="text-gray-500 dark:text-gray-400 font-medium">Statut</span>
                    <span th:if="${journal.statut == 'SUCCES'}" class="badge badge-success">Succès</span>
                    <span th:if="${journal.statut == 'ECHEC'}" class="badge badge-error">Échec</span>
                    <span th:if="${journal.statut == 'EN_COURS'}" class="badge badge-warning">En cours</span>
                </div>

                <!-- Date -->
                <div class="flex items-center justify-between p-5">
                    <span class="text-gray-500 dark:text-gray-400 font-medium">Date et heure</span>
                    <span class="font-mono text-gray-900 dark:text-white" th:text="${#temporals.format(journal.dateAction, 'dd/MM/yyyy HH:mm:ss')}"></span>
                </div>

                <!-- Adresse IP -->
                <div class="flex items-center justify-between p-5">
                    <span class="text-gray-500 dark:text-gray-400 font-medium">Adresse IP</span>
                    <span class="font-mono text-gray-900 dark:text-white" th:text="${journal.adresseIp}"></span>
                </div>

                <!-- Navigateur -->
                <div class="flex items-center justify-between p-5">
                    <span class="text-gray-500 dark:text-gray-400 font-medium">Navigateur</span>
                    <span class="text-sm text-gray-600 dark:text-gray-400 text-right max-w-md" th:text="${journal.navigateur}"></span>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
