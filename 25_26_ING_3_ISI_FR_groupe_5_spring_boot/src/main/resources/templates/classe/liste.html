<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/app}">
<head>
    <title>Classes — CarnetRouge</title>
</head>
<body>

<div layout:fragment="content">
    <div class="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8 lg:py-10">

        <!-- En-tête -->
        <div class="mb-8 lg:mb-10">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                <div>
                    <h1 class="font-serif text-[clamp(1.8rem,5vw,2.4rem)] leading-[1.2] text-gray-900 dark:text-gray-100 mb-2">
                        Classes <span class="text-primary italic">d'études</span>
                    </h1>
                    <p class="text-sm sm:text-base text-gray-500 dark:text-gray-400">
                        Gérez les classes par niveau
                    </p>
                </div>
                <button onclick="createModal.showModal()"
                        class="btn bg-primary hover:bg-primary/90 text-white border-none shadow-lg hover:shadow-xl transition-all duration-200 gap-2 py-2 px-4">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    Nouvelle classe
                </button>
            </div>
        </div>

        <!-- Filtres -->
        <div class="mb-6 p-4 bg-white dark:bg-bgcard rounded-xl border border-gray-200 dark:border-white/5">
            <div class="flex flex-wrap items-end gap-3">
                <!-- Filtre Niveau -->
                <div class="flex-1 min-w-[200px]">
                    <label class="block text-xs text-gray-500 mb-1">Niveau</label>
                    <select id="niveauSelect" class="w-full bg-gray-50 dark:bg-bgsurface border border-gray-300 dark:border-white/10 rounded-lg py-2 px-3 text-sm focus:outline-none focus:border-primary">
                        <option value="">Tous les niveaux</option>
                        <option th:each="niveau : ${niveaux}"
                                th:value="${niveau.id}"
                                th:text="${niveau.nom}"></option>
                    </select>
                </div>

                <!-- Filtre Spécialité -->
                <div class="flex-1 min-w-[200px]">
                    <label class="block text-xs text-gray-500 mb-1">Spécialité</label>
                    <select id="specialiteSelect" class="w-full bg-gray-50 dark:bg-bgsurface border border-gray-300 dark:border-white/10 rounded-lg py-2 px-3 text-sm focus:outline-none focus:border-primary">
                        <option value="">Toutes les spécialités</option>
                        <option th:each="specialite : ${specialites}"
                                th:value="${specialite.id}"
                                th:text="${specialite.nom}"></option>
                    </select>
                </div>

                <!-- Boutons -->
                <div class="flex gap-2">
                    <button id="filtrerBtn" class="bg-primary hover:bg-primary/90 text-white rounded-lg py-2 px-4 text-sm font-medium transition-all duration-200 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/>
                        </svg>
                        Filtrer
                    </button>
                    <button id="resetBtn" class="text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 rounded-lg py-2 px-3 text-sm transition-colors">
                        Réinitialiser
                    </button>
                </div>
            </div>
        </div>

        <!-- Messages flash -->
        <div th:if="${succes}" class="mb-6 alert alert-success shadow-lg p-3 rounded-xl">
            <span th:text="${succes}"></span>
        </div>
        <div th:if="${erreur}" class="mb-6 alert alert-error shadow-lg p-3 rounded-xl">
            <span th:text="${erreur}"></span>
        </div>

        <!-- Tableau des classes -->
        <div class="bg-white dark:bg-bgcard rounded-2xl shadow-sm dark:shadow-xl border border-gray-200 dark:border-white/5 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50 dark:bg-bgsurface border-b border-gray-200 dark:border-white/5">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Nom</th>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Niveau</th>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Spécialité</th>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Filière</th>
                        <th class="px-6 py-3 text-center text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Étudiants</th>
                        <th class="px-6 py-3 text-right text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Actions</th>
                    </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100 dark:divide-white/5">
                    <tr th:each="classe : ${classes}" class="hover:bg-gray-50 dark:hover:bg-bgsurface/50 transition-colors">
                        <td class="px-6 py-3">
                            <span class="font-semibold text-gray-900 dark:text-white" th:text="${classe.nom}">-</span>
                        </td>
                        <td class="px-6 py-3">
                            <span class="badge badge-primary py-0.5 px-2 text-xs" th:text="${classe.niveauNom}">-</span>
                        </td>
                        <td class="px-6 py-3">
                            <span th:if="${classe.specialiteNom != null}" class="badge badge-info py-0.5 px-2 text-xs" th:text="${classe.specialiteNom}">-</span>
                            <span th:unless="${classe.specialiteNom != null}" class="text-gray-400 text-sm">-</span>
                        </td>
                        <td class="px-6 py-3 text-sm text-gray-600 dark:text-gray-400" th:text="${classe.filiereNom}">-</td>
                        <td class="px-6 py-3 text-center">
                            <span class="font-mono bg-gray-100 dark:bg-bgsurface py-0.5 px-2 rounded text-sm">0</span>
                        </td>
                        <td class="px-6 py-3 text-right">
                            <div class="flex items-center justify-end gap-2">
                                <a th:href="@{/admin/classes/{id}(id=${classe.id})}"
                                   class="text-primary hover:text-primary/80 transition-colors p-1">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                    </svg>
                                </a>
                                <button th:onclick="'openEditModal(' + ${classe.id} + ')'"
                                        class="text-amber-600 hover:text-amber-700 dark:hover:text-amber-400 transition-colors p-1">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                    </svg>
                                </button>
                                <form th:action="@{/admin/classes/{id}/supprimer(id=${classe.id})}" method="post" class="inline">
                                    <button type="submit"
                                            class="text-red-500 hover:text-red-600 dark:hover:text-red-400 transition-colors p-1"
                                            onclick="return confirm('Supprimer cette classe ?')">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                        </svg>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${classes.empty}">
                        <td colspan="6" class="px-6 py-12 text-center text-gray-500 dark:text-gray-400">
                            <svg class="w-16 h-16 mx-auto mb-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                            </svg>
                            <p>Aucune classe</p>
                            <p class="text-sm mt-1">Cliquez sur "Nouvelle classe" pour commencer</p>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ==================== MODALE CRÉATION ==================== -->
    <dialog id="createModal" class="modal">
        <div class="modal-box bg-white dark:bg-bgcard max-w-md p-0 overflow-hidden">
            <div class="bg-gradient-to-r from-primary/10 to-transparent dark:from-primary/20 px-6 py-4 border-b border-gray-200 dark:border-white/10">
                <h3 class="font-serif text-xl font-bold text-gray-900 dark:text-white">
                    Nouvelle classe
                </h3>
                <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">
                    Créez une nouvelle classe
                </p>
            </div>

            <form th:action="@{/admin/classes/creer}" th:object="${form}" method="post" class="p-6 space-y-5">
                <!-- Niveau -->
                <div class="form-control w-full">
                    <label class="label">
                        <span class="label-text font-medium text-gray-700 dark:text-gray-300">Niveau <span class="text-red-500">*</span></span>
                    </label>
                    <select th:field="*{niveauId}" class="w-full bg-gray-50 dark:bg-bgsurface border border-gray-300 dark:border-white/10 rounded-lg py-2 px-3 text-sm focus:outline-none focus:border-primary" required>
                        <option value="" disabled selected>Sélectionner un niveau</option>
                        <option th:each="niveau : ${niveaux}" th:value="${niveau.id}" th:text="${niveau.nom}"></option>
                    </select>
                    <p th:if="${#fields.hasErrors('niveauId')}" th:errors="*{niveauId}" class="text-red-500 text-xs mt-1"></p>
                </div>

                <!-- Nom -->
                <div class="form-control w-full">
                    <label class="label">
                        <span class="label-text font-medium text-gray-700 dark:text-gray-300">Nom <span class="text-red-500">*</span></span>
                    </label>
                    <input type="text" th:field="*{nom}" placeholder="Ex: ING3" class="w-full bg-gray-50 dark:bg-bgsurface border border-gray-300 dark:border-white/10 rounded-lg py-2 px-3 text-sm focus:outline-none focus:border-primary" required/>
                    <p th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}" class="text-red-500 text-xs mt-1"></p>
                </div>

                <div class="flex gap-3 pt-4">
                    <form method="dialog" class="flex-1">
                        <button class="btn btn-ghost w-full py-2 px-4 rounded-lg">Annuler</button>
                    </form>
                    <button type="submit" class="btn bg-primary hover:bg-primary/90 text-white border-none flex-1 py-2 px-4 rounded-lg transition-all duration-200">Créer</button>
                </div>
            </form>
        </div>
        <form method="dialog" class="modal-backdrop">
            <button>Fermer</button>
        </form>
    </dialog>

    <!-- ==================== MODALE ÉDITION ==================== -->
    <dialog id="editModal" class="modal">
        <div class="modal-box bg-white dark:bg-bgcard max-w-md p-0 overflow-hidden">
            <div class="bg-gradient-to-r from-amber-500/10 to-transparent dark:from-amber-500/20 px-6 py-4 border-b border-gray-200 dark:border-white/10">
                <h3 class="font-serif text-xl font-bold text-gray-900 dark:text-white">
                    Modifier la classe
                </h3>
                <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">
                    Modifiez les informations de la classe
                </p>
            </div>

            <form method="post" class="p-6 space-y-5" id="editForm">
                <div class="form-control w-full">
                    <label class="label">
                        <span class="label-text font-medium text-gray-700 dark:text-gray-300">Niveau <span class="text-red-500">*</span></span>
                    </label>
                    <select name="niveauId" class="w-full bg-gray-50 dark:bg-bgsurface border border-gray-300 dark:border-white/10 rounded-lg py-2 px-3 text-sm focus:outline-none focus:border-primary" required>
                        <option value="" disabled>Sélectionner un niveau</option>
                        <option th:each="niveau : ${niveaux}" th:value="${niveau.id}" th:text="${niveau.nom}"></option>
                    </select>
                </div>

                <div class="form-control w-full">
                    <label class="label">
                        <span class="label-text font-medium text-gray-700 dark:text-gray-300">Nom <span class="text-red-500">*</span></span>
                    </label>
                    <input type="text" name="nom" class="w-full bg-gray-50 dark:bg-bgsurface border border-gray-300 dark:border-white/10 rounded-lg py-2 px-3 text-sm focus:outline-none focus:border-primary" required/>
                </div>

                <div class="flex gap-3 pt-4">
                    <form method="dialog" class="flex-1">
                        <button class="btn btn-ghost w-full py-2 px-4 rounded-lg">Annuler</button>
                    </form>
                    <button type="submit" class="btn bg-amber-600 hover:bg-amber-700 text-white border-none flex-1 py-2 px-4 rounded-lg transition-all duration-200">Enregistrer</button>
                </div>
            </form>
        </div>
        <form method="dialog" class="modal-backdrop">
            <button>Fermer</button>
        </form>
    </dialog>
</div>

<script>
    // Filtres
    const niveauSelect = document.getElementById('niveauSelect');
    const specialiteSelect = document.getElementById('specialiteSelect');
    const filtrerBtn = document.getElementById('filtrerBtn');
    const resetBtn = document.getElementById('resetBtn');

    function applyFilters() {
        const niveauId = niveauSelect.value;
        const specialiteId = specialiteSelect.value;
        let url = '/admin/classes?';
        if (niveauId) url += 'niveauId=' + niveauId + '&';
        if (specialiteId) url += 'specialiteId=' + specialiteId;
        window.location.href = url;
    }

    filtrerBtn.addEventListener('click', applyFilters);
    resetBtn.addEventListener('click', function() {
        window.location.href = '/admin/classes';
    });

    // Modale édition
    async function openEditModal(id) {
        if (!id) return;
        try {
            const response = await fetch('/admin/classes/' + id + '/json');
            if (!response.ok) throw new Error('Erreur HTTP');
            const data = await response.json();
            const form = document.getElementById('editForm');
            form.action = '/admin/classes/' + id + '/modifier';
            form.querySelector('[name="niveauId"]').value = data.niveauId;
            form.querySelector('[name="nom"]').value = data.nom;
            document.getElementById('editModal').showModal();
        } catch (error) {
            console.error('Erreur:', error);
            alert('Impossible de charger les données');
        }
    }
</script>
</body>
</html>
