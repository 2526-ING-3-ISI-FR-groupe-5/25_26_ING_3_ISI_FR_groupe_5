<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/app}">
<head>
    <title th:text="'École ' + ${ecole.nom} + ' — CarnetRouge'">Détail école — CarnetRouge</title>
</head>
<body>

<div layout:fragment="content">
    <div class="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8 lg:py-10">

        <!-- Navigation retour -->
        <div class="mb-6">
            <a th:href="@{/admin/ecoles}" class="inline-flex items-center gap-2 text-gray-500 hover:text-primary transition-colors group">
                <svg class="w-4 h-4 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                Retour à la liste
            </a>
        </div>

        <!-- En-tête -->
        <div class="mb-8 lg:mb-10">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                <div>
                    <div class="flex items-center gap-3 mb-2 flex-wrap">
                        <h1 class="font-serif text-[clamp(1.8rem,5vw,2.4rem)] leading-[1.2] text-gray-900 dark:text-gray-100">
                            <span class="text-primary italic" th:text="${ecole.nom}">ESI</span>
                        </h1>
                    </div>
                    <p class="text-sm sm:text-base text-gray-500 dark:text-gray-400">
                        École rattachée à <span class="font-semibold" th:text="${ecole.institutNom}">UCAD</span>
                    </p>
                </div>
                <div class="flex gap-3">
                    <a th:href="@{/admin/ecoles/{id}/modifier(id=${ecole.id})}"
                       class="btn btn-outline btn-warning gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                        </svg>
                        Modifier
                    </a>
                    <form th:action="@{/admin/ecoles/{id}/supprimer(id=${ecole.id})}" method="post" class="inline">
                        <button type="submit" class="btn btn-outline btn-error gap-2"
                                onclick="return confirm('Supprimer cette école ? Toutes les filières associées seront également supprimées.')">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                            </svg>
                            Supprimer
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Messages flash -->
        <div th:if="${succes}" class="mb-6 alert alert-success shadow-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span th:text="${succes}"></span>
        </div>

        <!-- Informations de l'école -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Carte principale -->
            <div class="lg:col-span-2 bg-white dark:bg-bgcard rounded-2xl border border-gray-200 dark:border-white/5 p-6">
                <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    Informations générales
                </h2>

                <div class="space-y-4">
                    <div class="flex items-start gap-3 pb-3 border-b border-gray-100 dark:border-white/5">
                        <div class="w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center shrink-0">
                            <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                            </svg>
                        </div>
                        <div>
                            <p class="text-xs text-gray-500 dark:text-gray-400">Institut de rattachement</p>
                            <p class="font-medium text-gray-900 dark:text-white" th:text="${ecole.institutNom}">UCAD</p>
                        </div>
                    </div>

                    <div class="flex items-start gap-3 pb-3 border-b border-gray-100 dark:border-white/5">
                        <div class="w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center shrink-0">
                            <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                            </svg>
                        </div>
                        <div>
                            <p class="text-xs text-gray-500 dark:text-gray-400">Adresse</p>
                            <p class="font-medium text-gray-900 dark:text-white" th:text="${ecole.adresse != null ? ecole.adresse : 'Non renseignée'}">Dakar, Sénégal</p>
                        </div>
                    </div>

                    <div class="flex items-start gap-3 pb-3 border-b border-gray-100 dark:border-white/5">
                        <div class="w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center shrink-0">
                            <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                            </svg>
                        </div>
                        <div>
                            <p class="text-xs text-gray-500 dark:text-gray-400">Email</p>
                            <p class="font-medium text-gray-900 dark:text-white" th:text="${ecole.email}">contact@esi.edu</p>
                        </div>
                    </div>

                    <div class="flex items-start gap-3">
                        <div class="w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center shrink-0">
                            <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                            </svg>
                        </div>
                        <div>
                            <p class="text-xs text-gray-500 dark:text-gray-400">Téléphone</p>
                            <p class="font-medium text-gray-900 dark:text-white" th:text="${ecole.telephone != null ? ecole.telephone : 'Non renseigné'}">33 123 45 67</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Carte statistiques -->
            <div class="bg-white dark:bg-bgcard rounded-2xl border border-gray-200 dark:border-white/5 p-6">
                <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                    </svg>
                    Statistiques
                </h2>

                <div class="space-y-4">
                    <div class="text-center p-4 bg-gray-50 dark:bg-bgsurface rounded-xl">
                        <p class="text-3xl font-bold text-primary">0</p>
                        <p class="text-sm text-gray-500 dark:text-gray-400">Filières</p>
                    </div>
                    <div class="text-center p-4 bg-gray-50 dark:bg-bgsurface rounded-xl">
                        <p class="text-3xl font-bold text-primary">0</p>
                        <p class="text-sm text-gray-500 dark:text-gray-400">Étudiants</p>
                    </div>
                    <div class="text-center p-4 bg-gray-50 dark:bg-bgsurface rounded-xl">
                        <p class="text-3xl font-bold text-primary">0</p>
                        <p class="text-sm text-gray-500 dark:text-gray-400">Enseignants</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
