<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Non authentifié — CarnetRouge</title>
    <link th:href="@{/css/output.css}" rel="stylesheet" type="text/css" />

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-linear-to-br from-yellow-50 to-gray-100 dark:from-bgdeep dark:to-gray-900 min-h-screen flex items-center justify-center p-4">
<div class="text-center max-w-md mx-auto">
    <div class="mb-8">
        <div class="text-9xl font-bold text-yellow-500">401</div>
        <div class="text-6xl mb-4">🔐</div>
    </div>
    <h1 class="text-2xl font-bold text-gray-800 dark:text-white mb-2">Session expirée</h1>
    <p class="text-gray-600 dark:text-gray-400 mb-6">
        Votre session a expiré ou vous n'êtes pas authentifié.
    </p>
    <div class="space-y-3">
        <a th:href="@{/login}" class="btn btn-primary btn-wide">
            Se connecter →
        </a>
    </div>
