<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<body>
<nav th:fragment="navbar" class="h-16 shrink-0 bg-bgdeep/85 backdrop-blur-md border-b border-white/5 px-4 md:px-8 flex items-center justify-end lg:justify-end gap-4 z-50">

    <!-- Toggle Dark/Light Mode -->
    <button id="theme-toggle" class="btn btn-ghost btn-circle btn-sm text-gray-400 hover:text-primary hover:bg-primary/10">
        <!-- Icône Lune -->
        <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
        <!-- Icône Soleil -->
        <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path></svg>
    </button>

    <div class="w-px h-6 bg-white/10 mx-1"></div>

    <!-- Dropdown Utilisateur (DaisyUI) -->
    <div class="dropdown dropdown-end">
        <div tabindex="0" role="button" class="flex items-center gap-3 hover:bg-bgsurface py-1.5 px-2 rounded-xl transition-colors cursor-pointer">
            <div class="w-8 h-8 bg-bgsubtle border border-white/10 rounded-full flex items-center justify-center text-sm font-bold text-gray-300 shadow-inner">
                A
            </div>
            <div class="hidden sm:block text-left">
                <div class="text-[13px] font-semibold text-gray-200 leading-tight" sec:authentication="name">Admin User</div>
                <div class="text-[11px] text-gray-500 font-medium">Administrateur</div>
            </div>
            <svg class="w-4 h-4 text-gray-500 hidden sm:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
        </div>

        <ul tabindex="0" class="dropdown-content z-[1] menu p-2 shadow-2xl bg-bgcard border border-white/10 rounded-box w-52 mt-4 text-gray-300">
            <li class="border-b border-white/5 pb-1 mb-1">
                <a th:href="@{/profile}" class="hover:bg-primary/10 hover:text-primary">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    Mon Profil
                </a>
            </li>
            <li>
                <a th:href="@{/parametres}" class="hover:bg-primary/10 hover:text-primary">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    Paramètres
                </a>
            </li>
            <li class="mt-1 pt-1 border-t border-white/5">
                <a th:href="@{/logout}" class="text-red-400 hover:bg-red-500/10 hover:text-red-400">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    Déconnexion
                </a>
            </li>
        </ul>
    </div>
</nav>
</body>
</html>
